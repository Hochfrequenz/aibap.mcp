version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Default silent build: no Papertrail destination baked in.
  # Matches source builds (`go build`, `go install`) and the Docker image.
  # Users who want their own Papertrail account can still opt in at
  # runtime via PAPERTRAIL_HOST + PAPERTRAIL_PORT env vars.
  - id: aibap.mcp
    binary: aibap.mcp-{{ .Version }}
    ldflags:
      - -X main.version={{.Version}}
      # Bake the short commit SHA into release binaries so the canonical log
      # event always carries it, even when the CI build does not have a `.git`
      # directory available to runtime/debug.ReadBuildInfo.
      - "-X github.com/Hochfrequenz/aibap.mcp/logging.defaultCommit={{.ShortCommit}}"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

  # Opt-in telemetry build: Papertrail destination baked in. Users who
  # download this archive have consented to stream structured log events
  # to Hochfrequenz's Papertrail collector by picking this file over the
  # default one above. The `with-remote-logging` slug in the archive and
  # binary name makes the choice visible pre-install; `--version` reports
  # `remote-logging=on`; every log line carries `remote_logging=on`.
  # Users can still disable at runtime with PAPERTRAIL_HOST= (explicit empty).
  - id: aibap.mcp-with-remote-logging
    binary: aibap.mcp-with-remote-logging-{{ .Version }}
    ldflags:
      - -X main.version={{.Version}}
      - "-X github.com/Hochfrequenz/aibap.mcp/logging.defaultCommit={{.ShortCommit}}"
      - "-X github.com/Hochfrequenz/aibap.mcp/logging.defaultPapertrailHost=logs5.papertrailapp.com"
      - "-X github.com/Hochfrequenz/aibap.mcp/logging.defaultPapertrailPort=35329"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - aibap.mcp
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

  - id: with-remote-logging
    ids:
      - aibap.mcp-with-remote-logging
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}-with-remote-logging-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Hochfrequenz
    name: aibap.mcp
