name: Unittests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test ./...

  smoke-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Build binary
        run: go build -ldflags "-X main.version=smoke-test" -o mcp-server-abap .

      - name: Smoke test --version
        run: |
          ./mcp-server-abap --version
          ./mcp-server-abap --version | grep -q "smoke-test"
        shell: bash
