name: Unittests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Run tests
        run: go test ./...

  smoke-test:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Build binary
        run: go build -ldflags "-X main.version=smoke-test" -o mcp-server-abap${{ runner.os == 'Windows' && '.exe' || '' }} .

      - name: Smoke test --version
        run: |
          ./mcp-server-abap${{ runner.os == 'Windows' && '.exe' || '' }} --version
          ./mcp-server-abap${{ runner.os == 'Windows' && '.exe' || '' }} --version | grep -q "smoke-test"
        shell: bash

      - name: Upload binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: mcp-server-abap-windows-amd64.exe
          path: mcp-server-abap.exe
