name: coverage

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Check per-package coverage
        run: |
          # Per-package coverage thresholds.
          #   Logic packages (parsing, config, auth): higher thresholds
          #   HTTP wrappers (adt client methods): medium threshold
          #   Tool handlers, logging, cmd: no threshold (tested via integration tests)
          declare -A thresholds=(
            ["github.com/Hochfrequenz/mcp-server-abap/config"]=80
            ["github.com/Hochfrequenz/mcp-server-abap/auth"]=75
            ["github.com/Hochfrequenz/mcp-server-abap/adt/adtxml"]=50
            ["github.com/Hochfrequenz/mcp-server-abap/adt/custexport"]=60
            ["github.com/Hochfrequenz/mcp-server-abap/adt"]=40
          )

          failed=0
          while IFS= read -r line; do
            pkg=$(echo "$line" | awk '{print $2}')
            pct=$(echo "$line" | sed -n 's/.*coverage: \([0-9.]*\)%.*/\1/p')
            [ -z "$pct" ] && continue

            threshold=${thresholds[$pkg]:-0}
            pct_int=${pct%.*}

            if [ "$threshold" -eq 0 ]; then
              echo "  $pkg: ${pct}% (no threshold)"
            elif [ "$pct_int" -lt "$threshold" ]; then
              echo "::error::$pkg: coverage ${pct}% is below threshold ${threshold}%"
              failed=1
            else
              echo "✓ $pkg: ${pct}% (threshold: ${threshold}%)"
            fi
          done < <(go test ./... -covermode=count 2>&1 | grep "^ok")

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo ""
          echo "All packages meet their coverage thresholds."
