name: golangci-lint

on:
  pull_request:

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --enable dupl,goconst,gocyclo

      - name: Check formatting
        run: golangci-lint fmt --diff --enable gofmt
